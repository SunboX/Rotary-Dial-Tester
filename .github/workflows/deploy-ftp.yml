name: Deploy to FTP (main)

on:
    push:
        branches: ['main']
        # optional: only deploy if certain paths changed
        # paths:
        #   - "dist/**"
        #   - "public/**"
        #   - ".github/workflows/deploy-ftp.yml"

concurrency:
    group: ftp-deploy-main
    cancel-in-progress: true

jobs:
    deploy:
        runs-on: ubuntu-latest
        env:
            FTP_SERVER: ${{ secrets.FTP_SERVER }}
            FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
            FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
            FTP_PORT: ${{ secrets.FTP_PORT }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - uses: dorny/paths-filter@v3
              id: changes
              with:
                  filters: |
                      deps:
                        - 'package.json'
                        - 'package-lock.json'
                      src:
                        - 'src/**'
                      api:
                        - 'api/**'
                      docs:
                        - 'docs/**'

            - name: Report skipped FTP deployment
              if: >-
                  (steps.changes.outputs.src == 'true' ||
                  steps.changes.outputs.deps == 'true' ||
                  steps.changes.outputs.api == 'true' ||
                  steps.changes.outputs.docs == 'true') &&
                  (env.FTP_SERVER == '' ||
                  env.FTP_USERNAME == '' ||
                  env.FTP_PASSWORD == '')
              run: |
                  echo "::warning::FTP deployment skipped because FTP_SERVER, FTP_USERNAME, or FTP_PASSWORD is not configured in repository secrets."

            # 1) Deploy src -> /
            # Deploy src always (or only if src changed)
            - name: Deploy src to /
              if: >-
                  env.FTP_SERVER != '' &&
                  env.FTP_USERNAME != '' &&
                  env.FTP_PASSWORD != '' &&
                  (steps.changes.outputs.src == 'true' || steps.changes.outputs.deps == 'true')
              uses: SamKirkland/FTP-Deploy-Action@v4.3.5
              with:
                  server: ${{ env.FTP_SERVER }}
                  username: ${{ env.FTP_USERNAME }}
                  password: ${{ env.FTP_PASSWORD }}
                  port: ${{ env.FTP_PORT }}
                  protocol: ftp
                  local-dir: ./src/
                  server-dir: /
                  exclude: |
                      **/node_modules/**
                      **/.env
                      **/.env.*
                      **/*.env
                      **/*.env.*
                  state-name: .ftp-deploy-src-state.json

            - name: Prepare package metadata for deployment
              if: >-
                  env.FTP_SERVER != '' &&
                  env.FTP_USERNAME != '' &&
                  env.FTP_PASSWORD != '' &&
                  steps.changes.outputs.deps == 'true'
              run: |
                  mkdir -p .deploy-metadata
                  cp package.json .deploy-metadata/package.json

            - name: Deploy package metadata
              if: >-
                  env.FTP_SERVER != '' &&
                  env.FTP_USERNAME != '' &&
                  env.FTP_PASSWORD != '' &&
                  steps.changes.outputs.deps == 'true'
              uses: SamKirkland/FTP-Deploy-Action@v4.3.5
              with:
                  server: ${{ env.FTP_SERVER }}
                  username: ${{ env.FTP_USERNAME }}
                  password: ${{ env.FTP_PASSWORD }}
                  port: ${{ env.FTP_PORT }}
                  protocol: ftp
                  local-dir: ./.deploy-metadata/
                  server-dir: /
                  state-name: .ftp-deploy-package-state.json

            # 2) Deploy PHP backend -> /api/
            - name: Deploy api to /api/
              if: >-
                  env.FTP_SERVER != '' &&
                  env.FTP_USERNAME != '' &&
                  env.FTP_PASSWORD != '' &&
                  steps.changes.outputs.api == 'true'
              uses: SamKirkland/FTP-Deploy-Action@v4.3.5
              with:
                  server: ${{ env.FTP_SERVER }}
                  username: ${{ env.FTP_USERNAME }}
                  password: ${{ env.FTP_PASSWORD }}
                  port: ${{ env.FTP_PORT }}
                  protocol: ftp
                  local-dir: ./api/
                  server-dir: /api/
                  exclude: |
                      **/.DS_Store
                      **/.env
                      **/.env.*
                      **/*.env
                      **/*.env.*
                  state-name: .ftp-deploy-api-state.json

            # 3) Deploy docs -> /docs/ (used for AI grounding when AI_DOCS_DIR=docs)
            - name: Deploy docs to /docs/
              if: >-
                  env.FTP_SERVER != '' &&
                  env.FTP_USERNAME != '' &&
                  env.FTP_PASSWORD != '' &&
                  steps.changes.outputs.docs == 'true'
              uses: SamKirkland/FTP-Deploy-Action@v4.3.5
              with:
                  server: ${{ env.FTP_SERVER }}
                  username: ${{ env.FTP_USERNAME }}
                  password: ${{ env.FTP_PASSWORD }}
                  port: ${{ env.FTP_PORT }}
                  protocol: ftp
                  local-dir: ./docs/
                  server-dir: /docs/
                  exclude: |
                      **/.DS_Store
                      **/.env
                      **/.env.*
                      **/*.env
                      **/*.env.*
                  state-name: .ftp-deploy-docs-state.json

            # 4) Deploy node_modules -> /node_modules/
            # Only install+deploy node_modules when deps changed
            - uses: actions/setup-node@v4
              if: >-
                  env.FTP_SERVER != '' &&
                  env.FTP_USERNAME != '' &&
                  env.FTP_PASSWORD != '' &&
                  steps.changes.outputs.deps == 'true'
              with:
                  node-version: 20
                  cache: npm

            # - name: Install & build
            #   run: |
            #     npm ci
            #     npm run build

            # Prefer npm ci for CI + reproducible installs
            - name: Install production dependencies
              if: >-
                  env.FTP_SERVER != '' &&
                  env.FTP_USERNAME != '' &&
                  env.FTP_PASSWORD != '' &&
                  steps.changes.outputs.deps == 'true'
              run: npm ci --omit=dev --ignore-scripts

            - name: Deploy node_modules
              if: >-
                  env.FTP_SERVER != '' &&
                  env.FTP_USERNAME != '' &&
                  env.FTP_PASSWORD != '' &&
                  steps.changes.outputs.deps == 'true'
              uses: SamKirkland/FTP-Deploy-Action@v4.3.5
              with:
                  server: ${{ env.FTP_SERVER }}
                  username: ${{ env.FTP_USERNAME }}
                  password: ${{ env.FTP_PASSWORD }}
                  port: ${{ env.FTP_PORT }}
                  local-dir: ./node_modules/
                  server-dir: /node_modules/
                  exclude: |
                      **/.git*
                      **/.github/**
                      **/.env
                      **/.env.*
                      **/*.env
                      **/*.env.*
                  state-name: .ftp-deploy-nm-state.json
